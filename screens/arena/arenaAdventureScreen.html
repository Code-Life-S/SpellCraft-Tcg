<div class="arena-adventure">
    <div class="game-board">
        <!-- Game Info Area -->
        <div class="game-info">
            <div class="turn-counter">
                <span class="turn-label">Round</span>
                <span class="turn-number" id="round-number">1</span>
                <span class="round-sep">/</span>
                <span class="round-total">12</span>
            </div>
            <div class="enemies-remaining">
                <span class="enemies-label">Enemies:</span>
                <span class="enemies-count" id="enemies-count">0</span>
            </div>
            <div class="game-status">
                <span class="status-text" id="game-status">Round 1</span>
            </div>
            <div class="ui-controls">
                <button class="header-btn concede-btn" id="concede-btn">
                    <span class="btn-icon">Concede</span>
                </button>
            </div>
        </div>

        <!-- Main Game Area with Sidebars -->
        <div class="main-game-area">
            <!-- Left Sidebar - Action History -->
            <div class="left-sidebar" id="left-sidebar">
                <div class="history-panel">
                    <h3>Action History</h3>
                    <div class="history-content" id="action-history">
                    </div>
                </div>
            </div>

            <!-- Center - Enemy Battlefield -->
            <div class="center-battlefield">
                <div class="enemy-battlefield" id="enemy-battlefield">
                    <div class="enemy-area" id="enemy-area">
                    </div>
                </div>
            </div>

            <!-- Right Sidebar - Deck Tracker -->
            <div class="right-sidebar" id="right-sidebar">
                <div class="deck-tracker">
                    <h3>Deck Tracker</h3>
                    <div class="deck-info">
                        <div class="deck-count">
                            <span class="deck-remaining" id="deck-remaining">10</span>
                            <span class="deck-total">/ 10</span>
                        </div>
                    </div>
                    <div class="deck-cards" id="deck-cards">
                    </div>
                </div>
            </div>
        </div>

        <!-- Player Area -->
        <div class="player-area">
            <div class="player-hero">
                <div class="hero-portrait" id="hero-portrait">
                    <div class="hero-stats">
                        <span class="hero-health" id="player-health">30</span>
                        <span class="hero-shield" id="player-shield" style="display: none;">0</span>
                    </div>
                </div>
            </div>

            <div class="player-hand" id="player-hand">
            </div>

            <div class="player-info">
                <div class="mana-crystals">
                    <span class="current-mana" id="current-mana">1</span>
                    <span class="max-mana" id="max-mana">/10</span>
                </div>
                <button class="end-turn-btn" id="end-turn-btn">End Turn</button>
            </div>
        </div>
    </div>

    <!-- Between-Round Overlay -->
    <div class="round-overlay hidden" id="round-overlay">
        <div class="round-overlay-content">
            <div class="round-victory" id="round-victory">
                <h2 class="victory-title">Round Complete!</h2>
                <div class="heal-display" id="heal-display">
                    <span class="heal-icon">+</span>
                    <span class="heal-amount" id="heal-amount">+0</span>
                    <span class="heal-label">Healed</span>
                </div>
                <div class="hp-increase-display hidden" id="hp-increase-display">
                    <span class="hp-up-icon">+</span>
                    <span class="hp-up-text" id="hp-up-text">Max HP +10</span>
                </div>
            </div>
            <div class="upgrade-section" id="upgrade-section">
                <h3 class="upgrade-title">Choose an Upgrade</h3>
                <div class="upgrade-choices" id="upgrade-choices">
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="gameover-overlay hidden" id="gameover-overlay">
        <div class="gameover-content">
            <div class="gameover-result" id="gameover-result">
                <h2 class="gameover-title victory" id="gameover-title">Victory!</h2>
                <p class="gameover-message" id="gameover-message">You conquered the arena!</p>
                <div class="gameover-stats" id="gameover-stats"></div>
                <button class="gameover-btn" id="gameover-btn">Back to Menu</button>
            </div>
        </div>
    </div>
</div>
