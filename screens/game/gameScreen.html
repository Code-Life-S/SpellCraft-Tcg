<div class="game-container">
    <!-- Game Over Overlay -->
    <div class="gameover-overlay hidden" id="gameover-overlay">
        <div class="gameover-content">
            <div class="gameover-result" id="gameover-result">
                <h2 class="gameover-title" id="gameover-title">Defeated!</h2>
                <p class="gameover-message" id="gameover-message">Your adventure has ended.</p>
                <div class="gameover-stats" id="gameover-stats"></div>
                <button class="gameover-btn" id="gameover-btn">Back to Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Board Area -->
    <div class="game-board">
        <!-- Main Game Area with Sidebars -->
        <div class="main-game-area">
            <!-- Left Sidebar - Action History -->
            <div class="left-sidebar" id="left-sidebar">
                <div class="history-panel">
                    <h3>Action History</h3>
                    <div class="history-content" id="action-history">
                        <!-- Action history will be added here -->
                    </div>
                </div>
            </div>

            <!-- Center - Enemy Battlefield -->
            <div class="center-battlefield">
                <div class="enemy-battlefield" id="enemy-battlefield">
                    <!-- Enemy waves will spawn here -->
                </div>
            </div>

            <!-- Right Sidebar - Deck Tracker -->
            <div class="right-sidebar" id="right-sidebar">
                <div class="deck-tracker">
                    <h3>Deck Tracker</h3>
                    <div class="deck-info">
                        <div class="deck-count">
                            <span class="deck-remaining" id="deck-remaining">30</span>
                            <span class="deck-total">/ 30</span>
                        </div>
                    </div>
                    <div class="deck-cards" id="deck-cards">
                        <!-- Deck card list will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Player Area -->
        <div class="player-area">
            <div class="player-hero">
                <div class="hero-portrait">
                    <div class="hero-stats">
                        <span class="hero-health" id="player-health">❤️ 30</span>
                        <span class="hero-shield" id="player-shield" style="display: none;">🛡️0</span>
                    </div>
                </div>
            </div>
            
            <div class="player-hand" id="player-hand">
                <!-- Player's spell cards will be dynamically generated here -->
            </div>
            
            <div class="player-info">
                <div class="mana-crystals">
                    <span class="current-mana" id="current-mana">3</span>
                    <span class="max-mana" id="max-mana">/10</span>
                </div>
                <button class="end-turn-btn" id="end-turn">End Turn</button>
            </div>
        </div>
    </div>
</div>
